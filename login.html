<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Scientific-Research Login</title>

  <!-- GOOGLE FONT -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- FONT AWESOME -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins', sans-serif;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:10px;

      overflow:auto;
      background: linear-gradient(135deg,rgba(1, 1, 104, 0.603),rgba(0, 255, 234, 0.452)),url('./src/blog4.webp');

      background-size:cover;
      background-position:center;

      position:relative;
    }

    body::before{

      content:"";

      position:absolute;

      width:100%;
      height:100%;

      backdrop-filter:blur(3px);
    }

    /* LOGIN CARD */

.login-box{

    width:380px;
    min-height: 600px;
    padding:20px 30px;

    border-radius:20px;

    background:rgba(8,16,60,.65);

    border:1px solid rgba(18,199,245,.25);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    box-shadow:
    0 0 20px rgba(0,0,0,.45),
    0 0 15px rgba(18,199,245,.12);

    position:relative;
    z-index:10;
}

    /* COMPANY LOGO */

    .logowrap{

      display:flex;
      justify-content:center;
      margin-top: 10px;
    }

    .companylogo{

      width:210px;
      margin-bottom: 10px;
      object-fit:contain;
    }



    /* SUBTITLE */

.subtitle{

    text-align:center;

    color:rgba(255,255,255,.75);

    font-size:14px;

    margin-bottom:16px;

    line-height:1.5;
}

/* INPUT BOX */

.input-box{

    margin-bottom:14px;
}

.input-box label{

    display:block;

    color:#12C7F5;

    margin-bottom:6px;

    font-size:14px;

    font-weight:600;
}

.input-field{

    position:relative;
}

/* LEFT ICON */

.input-field i.left-icon{

    position:absolute;

    left:16px;
    top:50%;

    transform:translateY(-50%);

    color:#12C7F5;

    font-size:14px;
}

/* INPUTS */

.input-field input{

    width:100%;

    height:46px;

    border-radius:12px;

    border:1px solid rgba(18,199,245,.35);

    background:rgba(255,255,255,.08);

    color:white;

    font-size:13px;

    padding-left:45px;
    padding-right:40px;

    outline:none;

    transition:.3s;
}

.input-field input::placeholder{

    color:rgba(255,255,255,.55);
}

.input-field input:focus{

    border-color:#12C7F5;

    box-shadow:
    0 0 12px rgba(18,199,245,.25);
}


    input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear,
input[type="password"]::-webkit-textfield-decoration-container {
    display: none !important;
}
    /* CUSTOM DROPDOWN */

    .custom-select{
      position:relative;
    }

    .select-btn{

    width:100%;

    height:46px;

    border-radius:12px;

    border:1px solid rgba(18,199,245,.35);

    background:rgba(255,255,255,.08);

    padding:0 16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    cursor:pointer;

    transition:.3s;
}

.select-btn:hover{

    border-color:#12C7F5;

    box-shadow:
    0 0 12px rgba(18,199,245,.25);
}

.select-left{

    display:flex;

    align-items:center;

    gap:12px;
}

.select-left i{

    color:#12C7F5;

    font-size:14px;
}

.select-left span{

    color:white;

    font-size:13px;
}

.arrow{

    color:#12C7F5;

    font-size:12px;

    transition:.3s;
}

.custom-select.active .arrow{
    transform:rotate(180deg);
}

    .custom-select.active .arrow{

      transform:rotate(180deg);
    }

    /* OPTIONS */
/* SELECT OPTIONS */

.select-options{

    position:absolute;

    top:54px;
    left:0;

    width:100%;

    background:#07113f;

    border:1px solid rgba(18,199,245,.35);

    border-radius:12px;

    overflow:hidden;

    display:none;

    z-index:100;

    box-shadow:
    0 10px 20px rgba(0,0,0,.35);
}

.custom-select.active .select-options{
    display:block;
}

/* OPTION */

.option{

    padding:13px 16px;

    color:#12C7F5;

    font-size:13px;

    cursor:pointer;

    transition:.25s;
}

.option:hover{

    background:#12C7F5;

    color:#02086A;
}

/* EYE BUTTON */

.eye-btn{

    position:absolute;

    right:14px;
    top:50%;

    transform:translateY(-50%);

    color:#12C7F5;

    cursor:pointer;

    font-size:14px;

    transition:.3s;
}

.eye-btn:hover{
    color:#5BE4FF;
}

    /* LOGIN BUTTON */
.login-btn{

    width:100%;
    height:46px;

    border:none;
    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #12C7F5,
        #05A9D6
    );

    color:#02086A;

    font-size:14px;
    font-weight:700;

    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:8px;

    transition:.3s;

    margin-top:30px;
    margin-bottom:20px;
}

.login-btn:hover{

    background:
    linear-gradient(
        135deg,
        #1ED7FF,
        #12C7F5
    );

    transform:translateY(-2px);

    box-shadow:
    0 8px 20px rgba(18,199,245,.35);
}
    /* FOOTER */

    .footer-text{

      text-align:center;

      color:#bdbdbd;

      font-size:14px;
    }

    .footer-text a{

      color: #12C7F5;

      text-decoration:none;
      font-weight:600;
      padding-left: 5px;
    }

    /* MOBILE */

    @media(max-width:768px){

      .login-box{

        width:100%;

        max-width:320px;

        padding:12px 16px;
      }

      .login-here-text{

        font-size:14px;
      }

    }

    .forget{
      text-align: center;
    }
    .forget a{
      text-decoration: none;
        text-align:center;

      color:#bdbdbd;

      font-size:14px;
    }

    /* =========================
   PHARMA GREEN THEME
========================= */

  </style>

</head>

<body>
<div class="login-box">

    <!-- LOGO -->
    <div class="logowrap">
        <a href="login.html">
            <img src="./src/logo.webp"
                alt="Scientific Research Logo"
                class="companylogo">
        </a>
    </div>

    <!-- SUBTITLE -->
    <p class="subtitle">
        Secure access for Researchers, Scientists, Project Coordinators, and Research Partners
    </p>

    <!-- ROLE -->
    <div class="input-box">

        <label>Select User Role</label>

        <div class="custom-select">

            <!-- BUTTON -->
            <div class="select-btn" id="selectBtn">

                <div class="select-left">

                    <i class="fa-solid fa-flask"></i>

                    <span id="selectedText">
                        Select User Role
                    </span>

                </div>

                <i class="fa-solid fa-chevron-down arrow"></i>

            </div>

            <!-- OPTIONS -->
            <div class="select-options" id="selectOptions">

                <div class="option" data-value="Admin">
                    Research Admin
                </div>

                <div class="option" data-value="Client">
                    Researcher
                </div>

            </div>

        </div>

    </div>

    <!-- EMAIL -->
    <div class="input-box">

        <label>Email Address</label>

        <div class="input-field">

            <i class="fa-solid fa-envelope left-icon"></i>

            <input
                type="email"
                id="email"
                placeholder="Enter your email address">

        </div>

    </div>

    <!-- PASSWORD -->
    <div class="input-box">

        <label>Password</label>

        <div class="input-field">

            <i class="fa-solid fa-lock left-icon"></i>

            <input
                type="password"
                placeholder="Enter your password"
                id="password">

            <span
                class="eye-btn"
                id="togglePassword">

                <i class="fa-solid fa-eye-slash"></i>

            </span>

        </div>

    </div>

    <!-- LOGIN BUTTON -->
    <button class="login-btn">

        <i class="fa-solid fa-microscope"></i>

        Access Research Portal

    </button>

    <!-- FOOTER -->

    <div class="footer-text">

        Create an Account

        <a href="sign.html">
            Register Account
        </a>

    </div>

    <div class="forget">
        <a href="404.html">
            Forgot Password?
        </a>
    </div>

</div>  

<script>

/* CUSTOM DROPDOWN */

const customSelect =
document.querySelector(".custom-select");

const selectBtn =
document.getElementById("selectBtn");

const selectedText =
document.getElementById("selectedText");

const options =
document.querySelectorAll(".option");

let selectedRole = "";

/* OPEN */

selectBtn.addEventListener("click", () => {

    customSelect.classList.toggle("active");

});

/* SELECT */

options.forEach((option) => {

    option.addEventListener("click", () => {

        selectedText.innerText =
        option.innerText;

        selectedRole =
        option.dataset.value;

        customSelect.classList.remove("active");

    });

});

/* OUTSIDE CLICK */

document.addEventListener("click", (e) => {

    if(!customSelect.contains(e.target)){

        customSelect.classList.remove("active");

    }

});

// GET FORM ELEMENTS

const emailInput =
document.querySelector('input[type="email"]');

const passwordInput =
document.getElementById("password");

const loginBtn =
document.querySelector(".login-btn");

// LOGIN BUTTON CLICK

loginBtn.addEventListener("click", (e) => {

    e.preventDefault();

    const role =
    selectedRole;

    const email =
    emailInput.value.trim();

    const password =
    passwordInput.value.trim();

    // ROLE VALIDATION

    if(role === ""){

        alert("Please select role");

        return;
    }

    // EMAIL VALIDATION

    if(email === ""){

        alert("Please enter email address");

        emailInput.focus();

        return;
    }

    const emailPattern =
    /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!email.match(emailPattern)){

        alert("Please enter valid email");

        emailInput.focus();

        return;
    }

    // PASSWORD VALIDATION

    if(password === ""){

        alert("Please enter password");

        passwordInput.focus();

        return;
    }

    if(password.length < 6){

        alert("Password must be minimum 6 characters");

        passwordInput.focus();

        return;
    }

    // SAVE EMAIL FOR DASHBOARD

    localStorage.setItem(
        "userEmail",
        email
    );

    // ROLE BASED REDIRECT

    if(role === "Admin"){

        window.location.href =
        "admin.html";

    }

    else if(role === "Client"){

        window.location.href =
        "client.html";

    }

});

// PASSWORD SHOW / HIDE

const eyepass =
document.getElementById("password");

const togglePassword =
document.getElementById("togglePassword");

const eyeIcon =
togglePassword.querySelector("i");

togglePassword.addEventListener("click", () => {

    if (eyepass.type === "password") {

        eyepass.type = "text";

        eyeIcon.classList.replace(
            "fa-eye-slash",
            "fa-eye"
        );

    } else {

        eyepass.type = "password";

        eyeIcon.classList.replace(
            "fa-eye",
            "fa-eye-slash"
        );
    }

});
</script>

</body>

</html>
