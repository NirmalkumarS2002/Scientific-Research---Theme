<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
}

.login-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:"Inter",sans-serif;

    background:
    linear-gradient(
        rgba(2,8,106,.85),
        rgba(2,8,106,.75)
    ),
    url("./src/home-bg1.webp");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.login-card{
    width:100%;
    max-width:450px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(5,201,245,.2);
    border-radius:20px;

    padding:40px 35px;

    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.login-header{
    text-align:center;
    margin-bottom:30px;
}

.login-header img{
    width:180px;
    max-width:100%;
    height:auto;
    margin-bottom:20px;
}

.login-header h2{
    color:#fff;
    font-size:34px;
    margin-bottom:10px;
}

.login-header p{
    color:rgba(255,255,255,.75);
    line-height:1.6;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    color:#fff;
    margin-bottom:8px;
    font-size:14px;
}

.form-group input,
.form-group select{
    width:100%;
    padding:15px;

    border:1px solid rgba(5,201,245,.2);
    border-radius:10px;

    background:rgba(255,255,255,.1);
    color:#fff;

    outline:none;
    transition:.3s;
}

.form-group select{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    cursor:pointer;
}

.form-group option{
    background:#02086A;
    color:#fff;
}

.form-group input::placeholder{
    color:rgba(255,255,255,.6);
}

.form-group input:focus,
.form-group select:focus{
    border-color:#05C9F5;
    box-shadow:0 0 15px rgba(5,201,245,.25);
}

.password-wrap{
    position:relative;
}

.eye-btn{
    position:absolute;
    right:15px;
    top:43px;

    color:#05C9F5;
    cursor:pointer;
    user-select:none;
}

.login-btn{
    width:100%;
    padding:15px;

    border:none;
    border-radius:10px;

    background:#05C9F5;
    color:#02086A;

    font-size:16px;
    font-weight:700;

    cursor:pointer;
    transition:.4s;
}

.login-btn:hover{
    background:#fff;
    transform:translateY(-2px);
}

.login-links{
    text-align:right;
    margin-top:15px;
}

.login-links a{
    color:#05C9F5;
    text-decoration:none;
    transition:.3s;
}

.login-links a:hover{
    color:#fff;
}

.signup-link{
    text-align:center;
    margin-top:25px;
    color:#fff;
    line-height:1.6;
}

.signup-link a{
    color:#05C9F5;
    text-decoration:none;
    font-weight:700;
}

.signup-link a:hover{
    color:#fff;
}

/* Tablet */

@media (max-width:768px){

    .login-card{
        max-width:420px;
        padding:35px 25px;
    }

    .login-header img{
        width:150px;
    }

    .login-header h2{
        font-size:28px;
    }
}

/* Mobile */

@media (max-width:576px){

    .login-section{
        padding:15px;
    }

    .login-card{
        max-width:100%;
        padding:30px 20px;
        border-radius:16px;
    }

    .login-header{
        margin-bottom:25px;
    }

    .login-header img{
        width:120px;
    }

    .login-header h2{
        font-size:24px;
    }

    .login-header p{
        font-size:14px;
    }

    .form-group label{
        font-size:13px;
    }

    .form-group input,
    .form-group select{
        padding:13px;
        font-size:14px;
    }

    .login-btn{
        padding:13px;
        font-size:15px;
    }

    .eye-btn{
        top:41px;
        right:12px;
        font-size:22px;
    }

    .signup-link,
    .login-links{
        font-size:14px;
    }
}

/* Small Mobile */

@media (max-width:360px){

    .login-card{
        padding:25px 15px;
    }

    .login-header img{
        width:100px;
    }

    .login-header h2{
        font-size:22px;
    }

    .login-header p{
        font-size:13px;
    }

    .form-group input,
    .form-group select{
        padding:12px;
    }

    .login-btn{
        padding:12px;
    }
}
</style>
<body>
    
<section class="login-section">

    <div class="login-card">

        <div class="login-header">
            <img src="./src/logo.webp" alt="Logo">
            <h2>Welcome Back</h2>
            <p>Access your research dashboard and resources.</p>
        </div>

        <form class="login-form">

            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="">Select Role</option>
                    <option>Admin</option>
                    <option>Client</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter Email Address">
            </div>

            <div class="form-group password-wrap">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password">

                <span class="material-symbols-outlined eye-btn" onclick="togglePassword()">visibility</span>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="login-links">
            <a href="#">Forgot Password?</a>
        </div>

        <div class="signup-link">
            New to the platform?
            <a href="register.html">Register Account</a>
        </div>

    </div>

</section>
</body>
</html>
