<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Research Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    font-family:"Inter",sans-serif;
    min-height:100vh;
     overflow-x: hidden;
    background: 
    linear-gradient(
        rgba(2,8,106,.88),
        rgba(2,8,106,.78)
    ),
    url("https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=1600");

    background-size:cover;
    background-position:center;
}

.error-section{
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:80px;
}

.left{

    max-width:650px;
}

.tag{

    display:inline-block;

    padding:10px 18px;

    border-radius:40px;

    background:rgba(18,199,245,.12);

    border:1px solid rgba(18,199,245,.25);

    color:#12C7F5;

    margin-bottom:25px;
}

.error-code{

    font-size:180px;

    font-weight:800;

    color:#12C7F5;

    line-height:1;
}

.title{

    color:white;

    font-size:60px;

    font-weight:800;

    margin-bottom:20px;
}

.desc{

    color:rgba(255,255,255,.8);

    font-size:18px;

    line-height:1.8;

    max-width:600px;
}

.btn-wrap{

    display:flex;
    gap:20px;

    margin-top:35px;
}

.btn{

    text-decoration:none;

    height:54px;

    padding:0 30px;



    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:700;

    transition:.3s;
}

.primary{

    background:
    linear-gradient(
    135deg,
    #12C7F5,
    #05A9D6
    );

    color:#02086A;
}

.primary:hover{

    transform:translateY(-4px);

    box-shadow:
    0 15px 30px rgba(18,199,245,.3);
}

.secondary{

    border:1px solid rgba(18,199,245,.25);

    color:white;

    background:rgba(255,255,255,.05);
}

.secondary:hover{
    background:rgba(18,199,245,.12);
}

.right{

    display:flex;
    align-items:center;
    justify-content:center;
}

.circle{

    width:350px;
    height:350px;

    border-radius:50%;

    border:2px solid rgba(18,199,245,.25);

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;

    animation:rotate 15s linear infinite;
}

.circle::before{

    content:"";

    position:absolute;

    inset:25px;

    border-radius:50%;

    border:2px dashed rgba(18,199,245,.25);
}

.atom{

    font-size:120px;
}

.atom-icon{
    font-size:120px;
    color:#12C7F5;
    text-shadow:0 0 25px rgba(18,199,245,.4);
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* Responsive */

@media(max-width:991px){

    .error-section{

        flex-direction:column;
        text-align:center;

        gap:50px;

        padding:50px 25px;
    }

    .btn-wrap{
        justify-content:center;
    }

    .error-code{
        font-size:120px;
    }

    .title{
        font-size:42px;
    }
}

@media(max-width:576px){

    .error-code{
        font-size:90px;
    }

    .title{
        font-size:32px;
    }

    .desc{
        font-size:15px;
    }

    .circle{
        width:220px;
        height:220px;
    }

    .atom{
        font-size:80px;
    }

    .btn-wrap{
        flex-direction:column;
    }

    .tag{
    padding:5px 18px;
        font-size: 15px ;
}

.btn{
    height:44px;
}
}

</style>
</head>

<body>

<section class="error-section">

    <div class="left">

        <span class="tag">
            Scientific Research Portal
        </span>

        <h1 class="error-code">
            404
        </h1>

        <h2 class="title">
            Research Page Missing
        </h2>

        <p class="desc">
            The page you are looking for could not be located.
            It may have been moved, removed, or is currently unavailable.
            Return to the main platform and continue exploring our research resources.
        </p>

        <div class="btn-wrap">

            <a href="index.html" class="btn primary">
                Back Home
            </a>

            <a href="javascript:history.back()" class="btn secondary">
                Previous Page
            </a>

        </div>

    </div>

    <div class="right">

       <div class="circle">
       <i class="fa-solid fa-dna atom-icon"></i>
</div>  

    </div>

</section>

</body>
</html>
